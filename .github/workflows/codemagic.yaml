workflows:
  ios-simulator-debug:
    name: iOS Simulator Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 60

    scripts:
      - name: Build without code signing
        script: |
          xcodebuild \
            -project Sihhatk.xcodeproj \
            -scheme Sihhatk \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build.log

    artifacts:
      - build.log
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
